<script type="module">
  import { initializeApp  } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

  import { popupNotification } from "./script/popupNotification.js"

  popupNotification.a = 2
  const firebaseConfig = {
    apiKey: "AIzaSyAhL7Gbr1ZqG0j1KOmMUUJtCN7byc669ss",
    authDomain: "csvcnhh.firebaseapp.com",
    projectId: "csvcnhh",
    storageBucket: "csvcnhh.firebasestorage.app",
    messagingSenderId: "682386956230",
    appId: "1:682386956230:web:9e048fd94c8fbbbcb05cc7"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const accessToken = localStorage.getItem("accessToken")
  async function sendTokenToServer(token) {
    try {
        const response = await fetch('/api/register-token', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${accessToken}`,
                credentials: "include",
            },
            body: JSON.stringify({ token })
        });
        console.log(response)
        if(response.status === 403) {
          popupNotification.ShowGetPermSatus("failWithoughtAccount")
        } else {
          popupNotification.ShowGetPermSatus("success", token)
        }
        // const data = await response.json();
        // popupNotification.ShowGetPermSatus("success", token)
        // console.log('Token registered:', data);
    } catch (error) {
        console.error('Error registering token:', error);
        popupNotification.ShowGetPermSatus("fail")
    }
}

(async() => {
  let issup = await isSupported();
  const fcmElement = document.getElementById('fcm-tok');
  const iconElement = document.getElementById('support-icon');
  function isIos() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  function isSafari() {
    return /Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent);
  }
  function isInStandaloneMode() {
    return window.matchMedia('(display-mode: standalone)').matches;
  }
  if(isIos() && !issup){
    fcmElement.innerHTML = `
      <div class="support-message support-no"> 
        Ghi nhận thiết bị đang truy cập là iOS (iPhone, iPad). Xin vui lòng cài đặt ứng dụng ở chế độ PWA (Chia sẻ -> Thêm vào màn hình chính [Add to Home Screen])
      </div>
    `;
    iconElement.innerHTML = '<i class="fa-solid fa-xmark cross-icon"></i>';
    document.querySelector('.check_is_support').classList.add('not-supported');
  }else{
    if(issup) {
      fcmElement.innerHTML = `
        <div class="support-message support-yes"> 
          Đây là thiết bị được hỗ trợ đầy đủ các tính năng. Hãy sử dụng "Lấy thông tin thiết bị" để lấy dữ liệu
        </div>
      `;
      iconElement.innerHTML = '<i class="fa-solid fa-check check-icon"></i>';
      document.querySelector('.check_is_support').classList.add('supported');
    } else {
      fcmElement.innerHTML = `
        <div class="support-message support-no"> 
          Thiết bị này không được hỗ trợ đầy đủ các tính năng. Xin tham khảo thêm "Tài liệu hướng dẫn"
        </div>
      `;
      iconElement.innerHTML = '<i class="fa-solid fa-xmark cross-icon"></i>';
      document.querySelector('.check_is_support').classList.add('not-supported');
    }
}
})();
  document.getElementById('fcm-tok').innerText = `Đang chờ kiểm định thiết bị`;
  async function getPerm(e) {
    Notification.requestPermission().then(async (permission) => {
      popupNotification.Init("getPerm")
      popupNotification.ShowGetPermSatus("loading")
      if (permission === 'granted') {
           
            console.log('Notification permission granted.');
            const token = await getToken(messaging,{
                vapidKey: 'BIkFyecCRIPZhZdynwDFni7NpX9Xm5tmx3rqaMMJhGfx29zcuo0q2qY5OhHCV7mQtS1egWywxXU1sr47gvHDjtg',
                serviceWorkerRegistration: await navigator.serviceWorker.register('./firebase-messaging-sw.js')
            });
            console.log('FCM Token:', token);

            //send token back to server
            sendTokenToServer(token)

      }
      else{
        popupNotification.ShowGetPermSatus("failWithNoNotifiPerm")
          // arlet("Hệ thống không được hỗ trợ nếu không được cấp quyền thông báo, xin hãy bật quyền")
      }

    })
  }
  document.getElementById("btn-getPerm").addEventListener("click", getPerm)

  // document.querySelector(".popupNotification_exit").addEventListener("click", async (e)=> {
  //   // e.preventDefault()
  //   popupNotification.Exit()
  // })

// Add this after initializing messaging
onMessage(messaging, (payload) => {
  console.log('Message received in foreground:', payload);
  
  // Display notification manually when app is in foreground
  if (Notification.permission === 'granted') {
    const notificationTitle = payload.notification.title || 'New Message';
    const notificationOptions = {
      body: payload.notification?.body || '',
      icon: '/nhh512.png' // Use your icon
    };
    new Notification(notificationTitle, notificationOptions);
  }
});
