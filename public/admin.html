<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin nhắn dynamic field</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/style/popupNotification.css">
  <link rel="stylesheet" href="/style/adminPage.css">
  <link rel="stylesheet" href="/style/responsive.css">
</head>
<body>
  <nav>
    <div class="left_block">
      <i class="fa-solid fa-bars menu_btn"></i>
      <a href="/" class="home_page_btn">NHH Notify</a>
    </div>
  </nav>

  
  <div style="padding: 40px;">
    <div class="open_side_bar_btn">
      <i class="fa-solid fa-sliders"></i>
    </div>
    <div class="template-container">
      <div class="admin_page_overlay show"></div>

      <div class="side_bar">
        <div class="side_bar_header">
          <h2 class="side_bar-account_name">NHH</h2>
          <div class="side_bar_header-nav">
            <i class="fa-solid fa-gear open_setting_btn"></i>
            <div class="side_bar_header-exit">
              <i class="fa-solid fa-xmark"></i>
            </div>
          </div>
        </div>
        <h3>Form</h3>
        <ul class="form_list">
          <!-- <li class="form_item selected">Dashboard</li>
          <li class="form_item ">form 2</li>
          <li class="form_item ">form 3</li> -->
        </ul>
        <button>➕ Thêm Form</button>
      </div>

      <div class="account_controller active">
        <h2>Tùy chỉnh tài khoản</h2>
        <br>
        <div class="warper form_info_box">
          <div class="join_code_block">
            <h3>Mã mời</h3><br>
            <div class="copy_join_code"><i class="fa-solid fa-copy"></i></div>
          </div>
          <div class="join_code"></div>
        </div>
      </div>

      <div class="form_config_controller">
        <h2>Tùy chỉnh thông tin form</h2>
        <div class="warper form_info_box">
          <h3>Tên form</h3><br>
          <input type="text" class="form_info_name" placeholder="Form 1">
        </div>

        <h2>Xem mẫu tin nhắn</h2>
        <div class="warper sheet_connect_box" id="sheet-connect">
          <h3>Kết nối Google Sheet</h3><br>
          <input type="text" id="sheet-id" placeholder="Spreadsheet ID" style="padding:8px; width:200px; outline: none;">
          <input type="text" id="sheet-name" placeholder="Sheet name" style="padding:8px; width:150px;">
          <button class="fetch_header_btn">Lấy header</button>
        </div>

        <div class="warper">
          <h3>Headers (cột) từ Google Sheet (nhập thủ công demo):</h3><br>
          <input type="text" id="header-input" placeholder="VD: Họ tên">
          <button class="add_header_btn">Thêm header</button>
        </div>

        <div class="warper fixed-header-settings">
          <h3>Tuỳ chỉnh header phần cố định</h3><br>
          <div class="fixed-setting-item">
            <label>Header Họ tên</label>
            <select id="fixed-ho-ten-header"></select>
          </div>
          <div class="fixed-setting-item">
            <label>Header Hạng mục</label>
            <select id="fixed-hang-muc-header"></select>
          </div>
        </div>

        <button class="add-field">➕ Thêm field</button>
        <div id="fields-area">
          <!-- <input type="text" placeholder="Label hiển thị" class="field-label">
          <select class="field-header"></select>
          <select class="field-range"></select>
          <button class="remove">X</button> -->
        </div>

        <hr><br>

        <div class="warp">
          <h3>Tùy chỉnh kiểu form</h3><br>
          <ul class="form_style_list">
            <li class="form_style_item selected" data-type="message">message</li>
            <li class="form_style_item" data-type="list">list</li>
          </ul>
        </div>

        <button class="show-message">Hiển thị tin nhắn mẫu</button>

        <div id="message-display">
          <!-- <div class="message-box">
            <div class="fixed-item">
              <div class="fixed-label name">Họ tên</div>
              <div class="fixed-label">Hạng mục</div>
            </div>
            <div class="message-content_list hidden">

            </div>
          </div> -->

          <!-- <div class="message_list">
            <ul class="message_title">
              <li class="message_title-item" data-range="20%">Name</li>
              <li class="message_title-item" data-range="20%">Phone</li>
              <li class="message_title-item" data-range="20%">Country</li>
              <li class="message_title-item" data-range="20%">Last Update</li>
              <li class="message_title-item" data-range="20%">Action</li>
            </ul>
            <ul class="message_list_content">
              <li class="message_item">
                <div class="message_item_value">Lê Tuấn Vũ</div>
                <div class="message_item_value">0345613927</div>
                <div class="message_item_value">VIỆT NAM</div>
                <div class="message_item_value">27/02/2008</div>
                <div class="message_item_value">BRUH I DONT KNOW</div>
              </li>
            </ul>
          </div> -->

        </div>

        <div class="save_box">
          <div class="clear_change_btn">Bỏ thay đổi</div>
          <div class="save_btn">Lưu</div>
        </div>
      </div>
    </div>
  </div>

  <!-- <div class="navigator">
    <div class="home_page_btn"><a href="/">Home</a></div>
  </div> -->

  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script>// Enable drag & drop sorting
    new Sortable(document.getElementById('fields-area'), {
        animation: 150
    });
  </script>
  <script src="/script/adminPage/configMessageController.js"></script>
  <script src="/script/adminPage/formController.js"></script>
  <script src="/script/adminPage/adminPageHandler.js"></script>
  
</body>
</html>
