<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống</title>
    <!-- Liên kết file CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style/popupNotification.css">
    <link rel="stylesheet" href="style/loginPage.css">
</head>
<body>
    <div class="container">
        <!-- Bên trái - Hình ảnh -->
        <div class="left-section">
            <div class="image-container">
                <!-- Hình ảnh tự động từ folder images -->
                <img id="characterImage" alt="Logo/Hình ảnh" class="character-image">
            </div>
        </div>

        <!-- Bên phải - Form đăng nhập -->
        <div class="right-section">
            <div class="form-container">
                <!-- Form đăng nhập -->
                <div id="loginForm" class="form-section active">
                    <div class="form-header">
                        <h1>Đăng Nhập</h1>
                    </div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginEmail">
                                <span class="required-star">*</span> Email
                            </label>
                            <input type="email" id="loginEmail" name="email" placeholder="Nhập email của bạn" required>
                            <div class="error-message" id="loginEmailError"></div>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">
                                <span class="required-star">*</span> Mật khẩu
                            </label>
                            <div class="password-input">
                                <input type="password" id="loginPassword" name="password" placeholder="Nhập mật khẩu" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                    👁️
                                </button>
                            </div>
                            <div class="error-message" id="loginPasswordError"></div>
                        </div>

                        <button type="submit" class="btn-submit">Đăng Nhập</button>
                    </form>
                    
                    <p style="text-align: center; margin-bottom: 12px;">HOẶC</p>
                    <div type="div" class="btn-login_as_member" onclick="showLoginAsMember()">Tham gia với người dùng khác</div>
                    
                    <div class="form-footer">
                        <button class="btn-secondary" onclick="showSignup()">Tạo tài khoản mới</button>
                    </div>
                </div>

                <!-- Form đăng ký -->
                <div id="signupForm" class="form-section">
                    <div class="form-header">
                        <h1>Đăng Ký</h1>
                        <p>Tạo tài khoản của bạn.</p>
                    </div>

                    <form onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label for="signupName">
                                <span class="required-star">*</span> Họ và tên
                            </label>
                            <input type="text" id="signupName" name="name" placeholder="Nhập họ và tên" required>
                            <div class="error-message" id="signupNameError"></div>
                        </div>

                        <div class="form-group">
                            <label for="signupEmail">
                                <span class="required-star">*</span> Email
                            </label>
                            <input type="email" id="signupEmail" name="email" placeholder="Nhập email của bạn" required>
                            <div class="error-message" id="signupEmailError"></div>
                        </div>

                        <div class="form-group">
                            <label for="signupPassword">
                                <span class="required-star">*</span> Mật khẩu
                            </label>
                            <div class="password-input">
                                <input type="password" id="signupPassword" name="password" placeholder="Nhập mật khẩu" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                                    👁️
                                </button>
                            </div>
                            <div class="error-message" id="signupPasswordError"></div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">
                                <span class="required-star">*</span> Xác nhận mật khẩu
                            </label>
                            <div class="password-input">
                                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                    👁️
                                </button>
                            </div>
                            <div class="error-message" id="confirmPasswordError"></div>
                        </div>

                        <button type="submit" class="btn-submit">Đăng Ký</button>
                    </form>

                    <div class="form-footer">
                        <button class="btn-secondary" onclick="showLogin()">Quay lại đăng nhập</button>
                    </div>
                </div>

                <!-- Form tham gia với người dùng khác -->
                <div id="loginAsMemberForm" class="form-section">
                    <div class="form-header">
                        <h1>Tham gia bằng mã mời</h1>
                    </div>

                    <form onsubmit="handleLoginAsMember(event)">
                        <div class="form-group">
                            <label for="joinCode">
                                <span class="required-star">*</span> Mã mời
                            </label>
                            <input type="text" id="joinCode" name="joinCode" placeholder="Nhập mã mời của bạn" required>
                            <div class="error-message" id="joinCodeError"></div>
                        </div>

                        <button type="submit" class="btn-submit">Tham Gia</button>
                    </form>
                    
                    <p style="text-align: center; margin-bottom: 12px;">HOẶC</p>
                    <div type="div" class="btn-login_as_member" onclick="showLogin()">Đăng Nhập Tài Khoản Riêng</div>
                    
                    <div class="form-footer">
                        <button class="btn-secondary" onclick="showSignup()">Tạo tài khoản mới</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="navigator">
        <div class="home_page_btn"><a href="/">Home</a></div>
    </div>  

    <!-- Liên kết file JavaScript -->
    <script type="module" src="./script/loginPage/loginHandler.js"></script>
</body>
</html>
